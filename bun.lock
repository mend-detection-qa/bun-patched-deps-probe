    "is-buffer": ["is-buffer@1.1.6", {}, "sha512-NcdALwpXkTm5Zvvbk7owB2drm3EgyB6ctqtIkAjVSi/qjfeesz9ow9ufz8G2TxB7Gm5h2OfdaVMFY1p2i4yMg=="],

